services:
  postgres:
    image: postgres:16-alpine
    container_name: oragami_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oragami_vault
    ports:
      - "5432:5432"
    volumes:
      - oragami_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  oragami_pg_data:
